  # Capítulo 1: Introducción a los Agentes de IA

  ## ¿Qué es un agente de IA?

  Un **agente de IA** es un sistema informático autónomo que percibe su entorno, toma decisiones y realiza acciones para alcanzar objetivos específicos.

  ### Componentes principales

  ```
  ┌─────────────┐     ┌─────────────┐     ┌─────────────┐
  │   Sensor    │ ──► │   Brain     │ ──► │   Actor     │
  │  (Percepción)│     │(Procesamiento)│    │  (Acción)   │
  └─────────────┘     └─────────────┘     └─────────────┘
  ```

  ### Tipos de agentes

  1. **Agentes reactivos**: Responden a estímulos inmediatos
  2. **Agentes de nivel mental**: Utilizan modelos del mundo
  3. **Agentes multi-objetivo**: Gestionan múltiples metas simultáneas
  4. **Agentes sociales**: Colaboran con otros agentes

  ## Evolución histórica

  | Era | Hitos |
  |-----|-------|
  | 1950s-1990s | Sistemas expertos, SOAR |
  | 2000-2010 | Agentes multi-agentes, planificación |
  | 2015-2020 | DeepMind, AlphaGo |
  | 2023+ | LLMs, agentes autónomos |

  ## Capacidades clave

  - **Autonomía**: Operar sin intervención humana constante
  - **Adaptabilidad**: Ajustarse a nuevos contextos
  - **Colaboración**: Trabajar en equipo
  - **Explicabilidad**: Comunicar decisiones

  ## Framework 5W1H para agentes

  - **Qué**: Funcionalidad y capacidades
  - **Por qué**: Objetivo y motivación
  - **Dónde**: Entorno de operación
  - **Cuándo**: Temporalidad y programación
  - **Quién**: Roles y actores
  - **Cómo**: Mecanismos e implementación

